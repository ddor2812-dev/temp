apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: demo
  annotations:
    argocd.argocdproj.io/sync-wave: "0"
spec:
  refreshInterval: "30s"
  secretStoreRef:
    name: aws-secret
    kind: SecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
  - secret: password
    remoteRef:
      key: demo/db-password
      property: password